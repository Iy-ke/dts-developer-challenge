<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMCTS Task Manager</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .task-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #005ea5; color: white; border: none; cursor: pointer; border-radius: 3px; }
        button.delete { background-color: #d4351c; }
        
        /* New Summary Dashboard Styles */
        .summary-dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .summary-box { flex: 1; padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; color: white; }
        .box-todo { background-color: #6c757d; }
        .box-progress { background-color: #f59e0b; }
        .box-done { background-color: #10b981; }

        /* Search Bar Styles */
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f3f4f6; border-radius: 5px; }
        .search-bar input { margin: 0; }
    </style>
</head>
<body>
    <h1>HMCTS Task Manager</h1>

    <div class="summary-dashboard">
        <div class="summary-box box-todo">To Do: <span id="count-todo">0</span></div>
        <div class="summary-box box-progress">In Progress: <span id="count-progress">0</span></div>
        <div class="summary-box box-done">Done: <span id="count-done">0</span></div>
    </div>

    <form class="search-bar" id="searchForm">
        <input type="number" id="searchId" placeholder="Search by Task ID..." min="1">
        <button type="submit">Search</button>
        <button type="button" onclick="fetchTasks()" style="background-color: #4b5563;">Clear Search</button>
    </form>
    
    <div class="task-card">
        <h3>Create New Task</h3>
        <form id="taskForm">
            <div class="form-group">
                <label>Title:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label>Description (Optional):</label>
                <textarea id="description"></textarea>
            </div>
            <div class="form-group">
                <label>Due Date & Time:</label>
                <input type="datetime-local" id="dueDate" required>
            </div>
            <div class="form-group">
                <label>Status:</label>
                <select id="status">
                    <option value="To Do">To Do</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </div>
            <button type="submit">Add Task</button>
        </form>
    </div>

    <h2>Current Tasks</h2>
    <div id="taskList"></div>

    <script src="app.js"></script>
</body>
</html>
