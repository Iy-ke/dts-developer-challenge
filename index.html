<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMCTS Task Manager</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .task-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .form-group { margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 15px; background-color: #005ea5; color: white; border: none; cursor: pointer; }
        button.delete { background-color: #d4351c; }
    </style>
</head>
<body>
    <h1>HMCTS Task Manager</h1>
    
    <div class="task-card">
        <h3>Create New Task</h3>
        <form id="taskForm">
            <div class="form-group">
                <label>Title:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label>Description (Optional):</label>
                <textarea id="description"></textarea>
            </div>
            <div class="form-group">
                <label>Due Date & Time:</label>
                <input type="datetime-local" id="dueDate" required>
            </div>
            <div class="form-group">
                <label>Status:</label>
                <select id="status">
                    <option value="To Do">To Do</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Done">Done</option>
                </select>
            </div>
            <button type="submit">Add Task</button>
        </form>
    </div>

    <h2>Current Tasks</h2>
    <div id="taskList"></div>

    <script src="app.js"></script>
</body>
</html>
